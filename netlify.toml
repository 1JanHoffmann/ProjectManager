[build]
  publish = "."
  functions = "netlify/functions"

# Map the friendly /api/data path to the function's default URL.
# Using a redirect (instead of config.path routing) is the most
# compatible setup and works with both Git and manual deploys.
[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200
  force = true
